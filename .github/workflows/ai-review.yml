name: Korean Code Review for PR
on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]
jobs:
  deep_review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/ai-review'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: AI 코드 리뷰 실행
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY가 설정되어 있지 않습니다."
            exit 1
          fi
          KEY_LEN=${#OPENAI_API_KEY}
          echo "OPENAI_API_KEY 감지 완료 (길이: $KEY_LEN)"
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
            BASE_BRANCH=$(jq -r '.pull_request.base.ref' "$GITHUB_EVENT_PATH")
            TITLE=$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")
            BODY=$(jq -r '.pull_request.body' "$GITHUB_EVENT_PATH")
          else
            PR_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
            BASE_BRANCH=$(gh pr view $PR_NUMBER --json baseRefName -q '.baseRefName')
            TITLE=$(gh pr view $PR_NUMBER --json title -q '.title')
            BODY=$(gh pr view $PR_NUMBER --json body -q '.body')
          fi
          
          echo "PR #$PR_NUMBER 분석 시작 (기준 브랜치: $BASE_BRANCH)"
          git fetch origin $BASE_BRANCH || true
          
          DIFF=$(git diff origin/$BASE_BRANCH...HEAD | head -n 2000)
          if [ -z "$DIFF" ]; then
            echo "변경된 코드가 없습니다."
            exit 0
          fi
          
          SAFE_DIFF=$(echo "$DIFF" | jq -Rs .)
          SAFE_TITLE=$(echo "$TITLE" | jq -Rs .)
          SAFE_BODY=$(echo "$BODY" | jq -Rs .)
          
          echo "OpenAI에 코드 리뷰 요청 중입니다."
          
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            --arg diff "$DIFF" \
            '{
              model: "gpt-4o-mini",
              messages: [
                {
                  role: "system",
                  content: "너는 10년 차 시니어 백엔드 개발자이자 코드 리뷰어다. 출력은 한국어로만 작성한다. 리뷰의 목표는 PR의 변경사항(diff)에 한정해 품질을 높이는 것이다. 변경되지 않은 코드나 추측에 기반한 코멘트는 금지한다. 출력은 Markdown 섹션 형식을 사용하며, 각 항목은 근거와 수정 제안을 포함해야 한다. 마지막에 핵심 개선점 요약(3줄 이내)을 반드시 포함하라."
                },
                {
                  role: "user",
                  content: ("PR 제목: " + $title + "\n\nPR 설명: " + $body + "\n\n변경된 코드 diff:\n\n" + $diff)
                }
              ]
            }')
          
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          
          echo "===== OpenAI 원본 응답 ====="
          echo "$RESPONSE"
          
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content' 2>/dev/null)
          ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message' 2>/dev/null)
          
          if [ "$ERROR_MSG" != "null" ] && [ -n "$ERROR_MSG" ]; then
            echo "OpenAI API 오류 발생: $ERROR_MSG"
            exit 1
          fi
          
          if [ -z "$REVIEW" ] || [ "$REVIEW" = "null" ]; then
            echo "AI 응답이 비어 있습니다."
            exit 0
          fi
          
          TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")
          gh api repos/${{ github.repository }}/issues/$PR_NUMBER/comments -f body="[$TIMESTAMP] $REVIEW"
          
          echo "AI 코드 리뷰 완료: PR #$PR_NUMBER"