name: Deep Korean Code Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

jobs:
  deep_review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/ai-review'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 가져오기 (no merge base 방지)

      - name: Generate Deep Korean Code Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
            BASE_BRANCH=$(jq -r '.pull_request.base.ref' "$GITHUB_EVENT_PATH")
            TITLE=$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")
            BODY=$(jq -r '.pull_request.body' "$GITHUB_EVENT_PATH")
          else
            PR_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
            BASE_BRANCH=$(gh pr view $PR_NUMBER --json baseRefName -q '.baseRefName')
            TITLE=$(gh pr view $PR_NUMBER --json title -q '.title')
            BODY=$(gh pr view $PR_NUMBER --json body -q '.body')
          fi

          echo "Analyzing PR #$PR_NUMBER (base: $BASE_BRANCH)"

          git fetch origin $BASE_BRANCH || true

          # 변경된 코드 diff (기준: base...HEAD)
          DIFF=$(git diff origin/$BASE_BRANCH...HEAD | head -n 2000)

          if [ -z "$DIFF" ]; then
            echo "No diff found. Skipping review."
            exit 0
          fi

          SAFE_DIFF=$(printf "%s" "$DIFF" | sed 's/"/\\"/g')

          REVIEW=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"너는 10년 차 시니어 백엔드 개발자이자 코드 리뷰어다. 출력은 한국어로만 작성한다. 리뷰의 목표는 PR의 변경사항(diff)에 한정해 품질을 높이는 것이다. 변경되지 않은 코드나 추측에 기반한 코멘트는 금지한다. 이모지를 절대 쓰지 말고, 형식과 기준을 반드시 지켜라. 출력은 Markdown 형식의 섹션으로 구성하며, 각 항목은 구체적인 근거를 포함해야 한다. 마지막에 '핵심 개선점 요약(3줄 이내)' 섹션을 포함하라.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": \"PR 제목: $TITLE\n\nPR 설명: $BODY\n\n변경된 코드 diff:\n\n$SAFE_DIFF\"
                }
              ]
            }" | jq -r '.choices[0].message.content')

          if [ -z "$REVIEW" ] || [ "$REVIEW" = "null" ]; then
            echo "AI response is null or empty. Skipping comment."
            exit 0
          fi

          gh api repos/${{ github.repository }}/issues/$PR_NUMBER/comments -f body="$REVIEW"

          echo "AI Code Review completed for PR #$PR_NUMBER"
