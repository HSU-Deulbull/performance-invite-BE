name: Deep Korean Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  deep_review:
    if: github.event_name == 'pull_request' || (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/ai-review'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Deep Korean Code Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 1. PR 정보 수집
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
            BASE_BRANCH=$(jq -r '.pull_request.base.ref' "$GITHUB_EVENT_PATH")
            TITLE=$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")
            BODY=$(jq -r '.pull_request.body' "$GITHUB_EVENT_PATH")
          else
            PR_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
            # 댓글 이벤트에서는 base 브랜치 정보가 없으므로 GitHub API로 가져오기
            BASE_BRANCH=$(gh pr view $PR_NUMBER --json baseRefName -q '.baseRefName')
            TITLE=$(gh pr view $PR_NUMBER --json title -q '.title')
            BODY=$(gh pr view $PR_NUMBER --json body -q '.body')
          fi

          echo "Analyzing PR #$PR_NUMBER (base: $BASE_BRANCH)"
          git fetch origin $BASE_BRANCH

          # 2. diff 제한 (대형 PR 방지, 상위 2000줄까지만 분석)
          DIFF=$(git diff origin/$BASE_BRANCH...HEAD | head -n 2000)

          # 3. OpenAI API 호출
          REVIEW=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-4o-mini",
              "messages": [
                {
                  "role": "system",
                  "content": "너는 10년 차 시니어 백엔드 개발자이자 코드 리뷰어다. 출력은 한국어로만 작성한다. 리뷰의 목표는 PR의 변경사항(diff)에 한정해 품질을 높이는 것이다. 변경되지 않은 코드나 추측에 기반한 코멘트는 금지한다. 이모지를 절대 쓰지 말고, 형식과 기준을 반드시 지켜라.\n\n입력에는 PR 제목, 설명, 변경 파일 목록, unified diff가 포함된다. 리뷰는 diff에 근거하여 작성하며, 각 지적 사항에 파일 경로와 근사 라인 번호를 표기하라.\n\n리뷰 범위:\n1. 정확성/기능 영향\n2. 아키텍처/설계\n3. 보안\n4. 성능/자원\n5. 테스트\n6. 마이그레이션/호환성\n7. 가독성/유지보수성\n\n출력 형식은 반드시 Markdown 형식의 제목을 사용하라. 각 섹션 제목 앞에는 ### 를 붙인다.\n\n### 요약\n- PR의 핵심 변경점과 시스템 영향.\n\n### 주요 이슈\n- 문제 설명, 근거(path:line), 수정 제안.\n\n### 보안/성능 점검\n- 관련 근거 포함.\n\n### 테스트 제안\n- 구체적 테스트 케이스 명과 시나리오.\n\n### 마이그레이션/배포 유의사항\n- 스키마, 데이터, 배포 순서 등 고려사항.\n\n### 준비도 평가\n- 병합 가능 / 수정 후 재검토 / 블로커 존재 중 하나와 판단 근거.\n\n출력의 마지막에는 반드시 '핵심 개선점 요약(3줄 이내)' 섹션을 추가하고, 가장 중요한 세 가지 이슈를 간결하게 정리하라.\n\n작성 규칙:\n- 각 지적은 diff의 변경 라인에 근거해야 함.\n- 추상적 조언은 금지하고, 적용 가능한 수정안을 제시.\n- 도메인 용어(preSale, performanceId 등)는 그대로 사용.\n- 기술 문서 톤으로 작성하고 불필요한 반복은 피한다."
                },
                {
                  "role": "user",
                  "content": "PR 제목: '"$TITLE"'\n\nPR 설명: '"$BODY"'\n\n다음은 이번 Pull Request의 변경된 코드 diff입니다:\n\n"'"${DIFF//\"/\\\"}"'"
                }
              ]
            }' | jq -r '.choices[0].message.content')

          # 4. 리뷰 결과 PR 댓글로 등록
          gh api repos/${{ github.repository }}/issues/$PR_NUMBER/comments -f body="$REVIEW"

          echo " AI Code Review completed for PR #$PR_NUMBER"
