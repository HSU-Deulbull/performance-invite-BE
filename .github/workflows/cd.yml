name: CD

on:
  workflow_run:
    workflows: ["CI with Gradle"]
    types: [completed]
    branches: [develop, main]

permissions:
  contents: read

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/deulbull

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            NAME="deulbull-prod"
            PROFILE="prod"
            DDL_AUTO="none"

            cd /home/${{ secrets.SERVER_USER }}

            # 환경 변수 파일 생성
            cat > ${NAME}.env << 'EOF'
            ${{ secrets.ENV_FILE }}
            EOF

            # DDL 설정과 Profile 추가
            echo "SPRING_PROFILES_ACTIVE=${PROFILE}" >> ${NAME}.env
            echo "SPRING_JPA_HIBERNATE_DDL_AUTO=${DDL_AUTO}" >> ${NAME}.env

            # Docker 로그인
            if [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
              echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            fi

            echo "[1/4] Pull new image..."
            docker pull ${{ env.IMAGE }}:${{ github.sha }}

            echo "[2/4] Restart Spring app..."
            docker compose rm -f ${NAME} || true
            docker compose up -d --no-deps ${NAME}

            echo "[3/4] Check status..."
            docker compose ps

            echo "[4/4] Cleanup..."
            docker image prune -f
