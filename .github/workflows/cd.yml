name: CD

on:
  workflow_run:
    workflows: ["CI with Gradle"]
    types: [completed]
    branches: [develop, main]

permissions:
  contents: read

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/deulbull

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            BRANCH="${{ github.event.workflow_run.head_branch }}"
            if [ "$BRANCH" = "main" ]; then
              NAME="deulbull"
              PORT=8080
              PROFILE="prod"
              DDL_AUTO="none"
            else
              NAME="deulbull-dev"
              PORT=8081
              PROFILE="dev"
              DDL_AUTO="update"
            fi

            # 환경 변수 파일 생성 (ENV_FILE에서 가져오되 DDL과 Profile 추가)
            cat > /home/${{ secrets.SERVER_USER }}/${NAME}.env << 'EOF'
            ${{ secrets.ENV_FILE }}
            EOF

            # DDL 설정과 Profile 추가
            echo "SPRING_PROFILES_ACTIVE=${PROFILE}" >> /home/${{ secrets.SERVER_USER }}/${NAME}.env
            echo "SPRING_JPA_HIBERNATE_DDL_AUTO=${DDL_AUTO}" >> /home/${{ secrets.SERVER_USER }}/${NAME}.env

            if [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
              echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            fi

            echo "[1/3] Pull latest image..."
            docker pull ${{ env.IMAGE }}:latest

            echo "[2/3] Restart container..."
            docker stop $NAME || true
            docker rm $NAME || true
            docker run -d --name $NAME \
              --env-file /home/${{ secrets.SERVER_USER }}/${NAME}.env \
              -p ${PORT}:8080 \
              --restart always \
              ${{ env.IMAGE }}:latest

            echo "[3/3] Cleanup..."
            docker image prune -f
