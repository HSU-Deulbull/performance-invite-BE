name: CD

on:
  workflow_run:
    workflows: ["CI with Gradle"]
    types: [completed]
    branches: [develop, main]

permissions:
  contents: read

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/deulbull

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            NAME="deulbull-prod"
            PROFILE="prod"
            DDL_AUTO="none"
            IMAGE="${{ env.IMAGE }}:${{ github.sha }}"

            cd /home/${{ secrets.SERVER_USER }}

            echo "Create env file..."
            cat > ${NAME}.env << EOF
            ${{ secrets.ENV_FILE }}
            SPRING_PROFILES_ACTIVE=${PROFILE}
            SPRING_JPA_HIBERNATE_DDL_AUTO=${DDL_AUTO}
            EOF

            echo "Docker login..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            echo "[1/4] Pull new image..."
            docker pull $IMAGE

            echo "[2/4] Stop old containers..."
            docker compose down

            echo "[3/4] Start new containers..."
            docker compose up -d

            echo "[4/4] Check status..."
            docker compose ps

            echo "Cleanup unused images..."
            docker image prune -f
